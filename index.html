<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal D&D</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="lobby.js" defer></script>
</head>
<body>

<div id="pantalla-lobby">
    <div class="lobby-header">
        <div class="lobby-head-row">
            <h1>Portal de Aventuras</h1>
            <button class="btn btn-red" onclick="cerrarSesion()">🔒 Cerrar Sesión</button>
        </div>
        <p>Bienvenido. Selecciona tu camino.</p>
    </div>
    
    <div class="lobby-grid">
        <div class="lobby-card">
            <h2>📜 Mis Historias Activas</h2>
            <div id="lista-personajes-lobby" class="card-list">
                <p class="text-muted" style="text-align:center;">Cargando desde la nube...</p>
            </div>
            <button class="btn btn-blue w-100 mt-10" onclick="alert('Próximamente: Ingresar código')">🔗 Unirse a una Historia por Código</button>
            <button class="btn btn-green w-100 mt-10" style="background-color: #27ae60; border: 1px solid #2ecc71;" onclick="crearNuevoPersonajeLobby()">+ Crear Personaje Libre (Sin Campaña)</button>
        </div>

        <div class="lobby-card dm-card">
            <h2>🐉 Modo Creador (DM)</h2>
            <div id="lista-historias-lobby" class="card-list">
                <p style="text-align: center; color: #7f8c8d; padding: 20px 0;">Cargando tus campañas...</p>
            </div>
            <button class="btn btn-warning w-100 mt-10" onclick="crearNuevaHistoria()">+ Crear Nueva Campaña</button>
        </div>

</body>
</html>
