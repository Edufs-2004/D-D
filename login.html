<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal D&D</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; min-height: 100vh; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; padding: 20px; background-image: radial-gradient(circle at center, #34495e 0%, #2c3e50 100%); }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 380px; }
        .login-card h2 { text-align: center; margin-top: 0; margin-bottom: 5px; font-size: 2.2rem; color: #2c3e50; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; }
        .login-form { display: flex; flex-direction: column; }
        .login-form label { font-weight: bold; color: #2c3e50; font-size: 14px; margin-bottom: 5px; margin-top: 15px;}
        .login-form input { padding: 12px; border: 2px solid #ecf0f1; border-radius: 6px; font-size: 15px; outline: none; transition: border 0.3s; background-color: #fafafa; }
        .login-form input:focus { border-color: #3498db; background-color: #fff; }
        .btn { padding: 12px; cursor: pointer; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 16px; transition: 0.2s; margin-top: 25px;}
        .btn-blue { background-color: #3498db; } .btn-blue:hover { background-color: #2980b9; }
        .btn-green { background-color: #2ecc71; margin-top: 10px; } .btn-green:hover { background-color: #27ae60; }
        #mensaje-error { font-size: 14px; text-align: center; margin-top: 15px; min-height: 20px; font-weight: bold;}
    </style>
</head>
<body>

    <div class="login-card">
        <h2>🐉 Portal D&D</h2>
        <p class="subtitle">Identifícate para entrar a la posada</p>
        
        <div class="login-form">
            <label for="login-email">Correo Electrónico</label>
            <input type="email" id="login-email" placeholder="aventurero@gremio.com">
            
            <label for="login-password">Contraseña (Mín. 6 letras)</label>
            <input type="password" id="login-password" placeholder="••••••••">
            
            <div id="mensaje-error"></div>
            
            <button class="btn btn-blue" onclick="iniciarSesion()">Entrar al Portal</button>
            <button class="btn btn-green" onclick="registrarUsuario()">Crear Nueva Cuenta</button>
        </div>
    </div>

    <script>
        const errorDiv = document.getElementById('mensaje-error');

        // Función para mostrar mensajes en pantalla
        function mostrarMensaje(texto, color) {
            errorDiv.style.color = color;
            errorDiv.innerText = texto;
        }

        // REGISTRAR CUENTA NUEVA
        async function registrarUsuario() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if(!email || !password) return mostrarMensaje("Ingresa correo y contraseña.", "#e74c3c");
            
            mostrarMensaje("Creando cuenta...", "#f39c12");

            // Usamos window.db (nuestra conexión de supabase.js)
            const { data, error } = await window.db.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                mostrarMensaje("Error: " + error.message, "#e74c3c");
            } else {
                mostrarMensaje("¡Cuenta creada! Entrando al portal...", "#27ae60");
                setTimeout(() => window.location.href = "index.html", 1500);
            }
        }

        // ENTRAR AL PORTAL (LOGIN)
        async function iniciarSesion() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if(!email || !password) return mostrarMensaje("Ingresa correo y contraseña.", "#e74c3c");

            mostrarMensaje("Verificando credenciales...", "#f39c12");

            const { data, error } = await window.db.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                mostrarMensaje("Credenciales incorrectas.", "#e74c3c");
            } else {
                mostrarMensaje("¡Bienvenido! Cargando el portal...", "#27ae60");
                setTimeout(() => window.location.href = "index.html", 1000);
            }
        }

        // Bloqueo inverso: Si ya estoy logueado y abro el login por error, me manda al Index
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await window.db.auth.getSession();
            if (session) {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
